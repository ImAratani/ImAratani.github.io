<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Modal de idiomas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      margin-top: 110px;
    }

    /* Estilos del modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.4);
    }

    .modal-content {
      background-color: #fefefe;
      margin: 15% auto;
      padding: 20px;
      border-radius: 10px;
      width: 30%;
      text-align: center;
      font-size: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    /* Estilos de los botones de idioma */
    .lang-btn {
      margin: 10px;
      padding: 10px;
      font-size: 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #333;
      color: white;
    }

    /* Estilos de las banderas de los idiomas */
    .flag {
      height: 30px;
      margin-right: 10px;
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <div class="modal">
    <div class="modal-content">
      <h2>Seleccione su idioma / Select your language</h2>
      <button id="btn-espanol" class="lang-btn">
        <img class="flag"
          src='https://media.discordapp.net/attachments/1065597141260709919/1082210479277092903/flag-round-250.png?width=375&height=375'
          alt="Español" />Español
      </button>
      <button id="btn-english" class="lang-btn">
        <img class="flag"
          src='https://media.discordapp.net/attachments/1065597141260709919/1082210478920568912/1200px-United-kingdom_flag_icon_round.svg.png?width=594&height=594'
          alt="English" />English
      </button>
    </div>
  </div>

  <script>
    // Obtener el modal
    var modal = document.querySelector(".modal");

    // Obtener los botones de idioma
    var btnEspanol = document.getElementById("btn-espanol");
    var btnEnglish = document.getElementById("btn-english");

    // Agregar eventos a los botones
    btnEspanol.addEventListener("click", function () {
      window.location.href = "webpage/espanol/inicio/inicio.html";
    });
    btnEnglish.addEventListener("click", function () {
      window.location.href = "webpage/ingles/inicio/inicio.html";
    });

    // Mostrar el modal al cargar la página
    modal.style.display = "block";
  </script>
</body>

</html>
